name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy

      - name: Structural lint (duplicate-def guard — the answer() shadow bug class)
        run: python scripts/lint.py

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check (mypy) — advisory until findings are cleared
        run: mypy src/
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          # Honest floor. Ratcheted 60 -> 74 after the live Atlassian providers
          # (confluence/jira now 100%), the CLI (0% -> 80%), and the onboarding
          # flow/generator/extractor gained real coverage. Measured floor with
          # those tests is ~75%; the full suite sits higher (~80%). Remaining 0%
          # gaps are mostly the heavier integration paths.
          # Ratchet this number UP as coverage grows; don't let it slip.
          pytest tests/ -q --cov=src --cov-report=term-missing --cov-fail-under=74
        env:
          SYNCBOT_TEST: "1"
          # Ensure no API key is set so tests exercise the heuristic path
          ANTHROPIC_API_KEY: ""
