name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint with ruff (tests only; src/ has pre-existing issues tracked separately)
        run: ruff check tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ -q --cov=src --cov-report=term-missing --cov-fail-under=70
        env:
          # Ensure no API key is set so tests exercise the heuristic path
          ANTHROPIC_API_KEY: ""
