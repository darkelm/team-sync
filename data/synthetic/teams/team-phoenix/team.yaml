team: Team Phoenix
description: Auth & Identity — owns all authentication, authorization, and session management across the platform.
owner:
  name: Sarah Chen
  role: Engineering Lead
  slack_handle: "@sarah.chen"
  email: sarah.chen@acme.co
members:
  - name: Marcus Webb
    role: Senior Engineer
    slack_handle: "@marcus.webb"
