components:
  code:
    - name: design-system
      path: packages/design-system
      description: Published npm package — shared React components and design tokens
    - name: tokens
      path: packages/design-system/tokens
      description: Design tokens (color, spacing, typography) — source of truth
  design:
    - name: Button
      figma_node_id: "789:100"
      description: Primary, secondary, ghost, and destructive button variants
    - name: FormInput
      figma_node_id: "789:200"
      description: Text input, textarea, select — all form controls
    - name: Modal
      figma_node_id: "789:300"
      description: Modal, drawer, and dialog patterns
    - name: Badge
      figma_node_id: "789:400"
      description: Status badge, count badge, label variants
    - name: DataTable
      figma_node_id: "789:500"
      description: Canonical data table — NOTE updated with new row hover state 2026-05-27
    - name: NotificationBell
      figma_node_id: "789:600"
      description: Notification bell icon with count indicator
dependencies: []
roadmap_link: https://confluence.acme.co/wiki/NOVA/roadmap
quarter_goals:
  - Ship design system v3.0 with updated color tokens (breaking change for all teams)
  - Document all components with usage guidelines
  - Establish design review process for cross-team component proposals
resources:
  - name: Brand assets & logo kit
    type: brand-assets
    url: https://brandfolder.com/acme/brand-kit
    description: Official logos, color palette, typography, icon set, illustration library
  - name: Design system documentation site
    type: doc
    url: https://design.acme.co
    description: Component usage guidelines, accessibility specs, do's and don'ts
  - name: Design tokens repository
    type: repo
    url: https://github.com/acme/design-tokens
    description: Source of truth for color, spacing, typography tokens across all platforms
