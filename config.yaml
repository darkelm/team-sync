# Team Sync — provider configuration
# Switch any provider from "local" to "live" when credentials are ready.
# Nothing else in the codebase needs to change.

providers:
  jira: local
  confluence: local
  github: local
  slack: live
  figma: local

data:
  synthetic_path: ./data/synthetic
  teams_dir: ./data/synthetic/teams

digest:
  schedule: "0 9 * * 1"   # Monday 9am
  timezone: "America/New_York"

drift:
  scan_on_pr: true
  scan_schedule: "0 8 * * *"   # Daily 8am

# Leadership rollup framing — neutral defaults; swap to engagement/workstream
# language for a consultancy, or product-area/squad for an internal org.
leadership:
  unit_label: "team"          # what a single unit is called (team | workstream | squad)
  portfolio_label: "portfolio" # the collection of units (portfolio | engagement | product area)
  exec_channel: ""            # optional Slack channel for the weekly exec digest
